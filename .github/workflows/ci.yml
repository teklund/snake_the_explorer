name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    name: Analyze & Test (Dart packages)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: dart pub get

      - name: Analyze
        run: dart analyze --fatal-infos

      - name: Test core package
        run: dart test packages/snake_game_core

      - name: Test CLI package
        run: dart test packages/snake_game_cli

  flutter-test:
    name: Flutter Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: dart pub get

      - name: Flutter test
        run: cd packages/snake_game_flutter && flutter test

  build-android:
    name: Build Android
    needs: [analyze-and-test, flutter-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: dart pub get

      - name: Build APK
        run: cd packages/snake_game_flutter && flutter build apk --debug

  build-ios:
    name: Build iOS
    needs: [analyze-and-test, flutter-test]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: dart pub get

      - name: Build iOS (no codesign)
        run: cd packages/snake_game_flutter && flutter build ios --debug --no-codesign

  build-web:
    name: Build Web
    needs: [analyze-and-test, flutter-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: dart pub get

      - name: Build Web
        run: cd packages/snake_game_flutter && flutter build web

  build-linux:
    name: Build Linux
    needs: [analyze-and-test, flutter-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev liblzma-dev libstdc++-12-dev clang cmake pkg-config libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev gstreamer1.0-plugins-good

      - name: Install dependencies
        run: dart pub get

      - name: Build Linux
        run: cd packages/snake_game_flutter && flutter build linux --debug

  build-macos:
    name: Build macOS
    needs: [analyze-and-test, flutter-test]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: dart pub get

      - name: Build macOS
        run: cd packages/snake_game_flutter && flutter build macos --debug

  build-windows:
    name: Build Windows
    needs: [analyze-and-test, flutter-test]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: dart pub get

      - name: Build Windows
        run: cd packages/snake_game_flutter && flutter build windows --debug

  build-cli:
    name: Build CLI (${{ matrix.os }})
    needs: [analyze-and-test]
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: snake_cli_linux
          - os: macos-latest
            artifact: snake_cli_macos
          - os: windows-latest
            artifact: snake_cli_windows.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: dart pub get

      - name: Compile CLI executable
        run: dart compile exe packages/snake_game_cli/bin/main.dart -o ${{ matrix.artifact }}

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  deploy-pages:
    name: Deploy to GitHub Pages
    needs: [build-web]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: dart pub get

      - name: Build Web for GitHub Pages
        run: cd packages/snake_game_flutter && flutter build web --base-href /

      - name: Add CNAME for custom domain
        run: cp packages/snake_game_flutter/web/CNAME packages/snake_game_flutter/build/web/CNAME

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: packages/snake_game_flutter/build/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
