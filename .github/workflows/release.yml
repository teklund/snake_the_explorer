name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-dart:
    name: Analyze & Test (Dart packages)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: dart pub get

      - name: Analyze
        run: dart analyze --fatal-infos

      - name: Test core package
        run: dart test packages/snake_game_core

      - name: Test CLI package
        run: dart test packages/snake_game_cli

  test-flutter:
    name: Flutter Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: dart pub get

      - name: Flutter test
        run: cd packages/snake_game_flutter && flutter test

  build-cli:
    name: Build CLI (${{ matrix.os }})
    needs: [test-dart]
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: snake_cli_linux
          - os: macos-latest
            artifact: snake_cli_macos
          - os: windows-latest
            artifact: snake_cli_windows.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: dart pub get

      - name: Compile CLI executable
        run: dart compile exe packages/snake_game_cli/bin/main.dart -o ${{ matrix.artifact }}

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  build-web:
    name: Build Flutter Web
    needs: [test-flutter]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: dart pub get

      - name: Build Web
        run: cd packages/snake_game_flutter && flutter build web

      - name: Zip web build
        run: cd packages/snake_game_flutter/build/web && zip -r ../../../../snake_web.zip .

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: snake_web.zip
          path: snake_web.zip

  release:
    name: Create GitHub Release
    needs: [build-cli, build-web]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp artifacts/snake_cli_linux/snake_cli_linux release/
          cp artifacts/snake_cli_macos/snake_cli_macos release/
          cp artifacts/snake_cli_windows.exe/snake_cli_windows.exe release/
          cp artifacts/snake_web.zip/snake_web.zip release/
          chmod +x release/snake_cli_linux release/snake_cli_macos

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/snake_cli_linux
            release/snake_cli_macos
            release/snake_cli_windows.exe
            release/snake_web.zip
