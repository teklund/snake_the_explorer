version: 2

updates:
  # Dart/Flutter dependencies (pub)
  - package-ecosystem: pub
    directory: /
    schedule:
      interval: weekly
    groups:
      dart-dependencies:
        patterns: ["*"]
    commit-message:
      prefix: "deps"

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"
